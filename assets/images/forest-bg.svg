<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="667" viewBox="0 0 375 667" xmlns="http://www.w3.org/2000/svg">
  <!-- 天空渐变背景 -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- 森林渐变 -->
    <linearGradient id="forestGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#228B22;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#006400;stop-opacity:1" />
    </linearGradient>
    
    <!-- 树木渐变 -->
    <linearGradient id="treeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#32CD32;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 天空背景 -->
  <rect width="375" height="667" fill="url(#skyGradient)"/>
  
  <!-- 远山轮廓 -->
  <path d="M0,400 Q100,350 200,380 T375,400 L375,667 L0,667 Z" fill="#8FBC8F" opacity="0.6"/>
  <path d="M0,420 Q150,370 300,400 T375,420 L375,667 L0,667 Z" fill="#9ACD32" opacity="0.5"/>
  
  <!-- 森林树木群 -->
  <g opacity="0.8">
    <!-- 左侧树木群 -->
    <ellipse cx="80" cy="450" rx="40" ry="80" fill="url(#treeGradient)"/>
    <ellipse cx="60" cy="470" rx="35" ry="70" fill="url(#treeGradient)"/>
    <ellipse cx="100" cy="460" rx="38" ry="75" fill="url(#treeGradient)"/>
    
    <!-- 中间树木群 -->
    <ellipse cx="187" cy="430" rx="45" ry="90" fill="url(#treeGradient)"/>
    <ellipse cx="160" cy="450" rx="40" ry="80" fill="url(#treeGradient)"/>
    <ellipse cx="210" cy="440" rx="42" ry="85" fill="url(#treeGradient)"/>
    
    <!-- 右侧树木群 -->
    <ellipse cx="295" cy="460" rx="38" ry="75" fill="url(#treeGradient)"/>
    <ellipse cx="275" cy="470" rx="35" ry="70" fill="url(#treeGradient)"/>
    <ellipse cx="315" cy="450" rx="40" ry="80" fill="url(#treeGradient)"/>
  </g>
  
  <!-- 前景草地 -->
  <path d="M0,500 Q187,480 375,500 L375,667 L0,667 Z" fill="#228B22" opacity="0.7"/>
  <path d="M0,520 Q187,500 375,520 L375,667 L0,667 Z" fill="#32CD32" opacity="0.6"/>
  
  <!-- 云朵 -->
  <g opacity="0.7">
    <ellipse cx="100" cy="120" rx="25" ry="12" fill="white"/>
    <ellipse cx="120" cy="115" rx="30" ry="15" fill="white"/>
    <ellipse cx="140" cy="120" rx="20" ry="10" fill="white"/>
    
    <ellipse cx="250" cy="80" rx="20" ry="10" fill="white"/>
    <ellipse cx="270" cy="75" rx="25" ry="12" fill="white"/>
    <ellipse cx="285" cy="80" rx="18" ry="9" fill="white"/>
    
    <ellipse cx="320" cy="150" rx="22" ry="11" fill="white"/>
    <ellipse cx="340" cy="145" rx="28" ry="14" fill="white"/>
  </g>
  
  <!-- 阳光效果 -->
  <circle cx="300" cy="100" r="40" fill="#FFD700" opacity="0.3"/>
  <circle cx="300" cy="100" r="25" fill="#FFD700" opacity="0.4"/>
  <circle cx="300" cy="100" r="15" fill="#FFD700" opacity="0.5"/>
  
  <!-- 装饰性小草 -->
  <g opacity="0.6" stroke="#228B22" stroke-width="2" fill="none">
    <path d="M50,580 Q55,570 60,580"/>
    <path d="M70,590 Q75,580 80,590"/>
    <path d="M150,570 Q155,560 160,570"/>
    <path d="M200,585 Q205,575 210,585"/>
    <path d="M280,575 Q285,565 290,575"/>
    <path d="M320,590 Q325,580 330,590"/>
  </g>
</svg>